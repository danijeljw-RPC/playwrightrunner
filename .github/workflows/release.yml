name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate-tag:
    name: Validate tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository history
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Require vX.Y.Z tag
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must match vX.Y.Z, for example v1.0.0." >&2
            exit 1
          fi

      - name: Require tag commit to be on main
        shell: bash
        run: |
          tag_commit="$(git rev-parse "${GITHUB_REF}^{commit}")"

          if ! git merge-base --is-ancestor "$tag_commit" origin/main; then
            echo "Release tag $GITHUB_REF_NAME must point to a commit on the main branch." >&2
            exit 1
          fi

      - name: Require matching changelog section
        shell: bash
        run: |
          notes="$(bash scripts/extract-release-notes.sh "$GITHUB_REF_NAME")" || {
            echo "CHANGELOG.md must contain a section named ## $GITHUB_REF_NAME" >&2
            exit 1
          }

          if [[ -z "${notes//[[:space:]]/}" ]]; then
            echo "The ## $GITHUB_REF_NAME section in CHANGELOG.md must not be empty." >&2
            exit 1
          fi

  build:
    name: Build ${{ matrix.runtime.name }} ${{ matrix.browser }}
    needs: validate-tag
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - name: linux-x64
            os: ubuntu-latest
          - name: win-x64
            os: windows-latest
        browser:
          - chrome
          - firefox
          - webkit
          - all
    runs-on: ${{ matrix.runtime.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Package Linux
        if: runner.os == 'Linux'
        shell: bash
        run: bash scripts/package.sh "${{ matrix.runtime.name }}" "${{ matrix.browser }}" "$GITHUB_REF_NAME"

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/package.ps1 -Runtime "${{ matrix.runtime.name }}" -Browsers "${{ matrix.browser }}" -VersionSuffix "${{ github.ref_name }}"

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: ScriptTrail-${{ matrix.runtime.name }}-${{ matrix.browser }}-${{ github.ref_name }}
          path: artifacts/zips/*.zip
          if-no-files-found: error

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          path: artifacts/zips
          merge-multiple: true

      - name: Generate SHA-256 manifest
        shell: bash
        run: |
          shopt -s nullglob
          files=(artifacts/zips/*.zip)

          if (( ${#files[@]} == 0 )); then
            echo "No ZIP files found in artifacts/zips" >&2
            exit 1
          fi

          (
            cd artifacts/zips
            sha256sum -- *.zip > SHA256SUMS
          )

      - name: Extract release notes from changelog
        shell: bash
        run: bash scripts/extract-release-notes.sh "$GITHUB_REF_NAME" > release-notes.md

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          files=(artifacts/zips/*.zip artifacts/zips/SHA256SUMS)

          if (( ${#files[@]} < 2 )); then
            echo "ZIP packages or SHA256SUMS are missing." >&2
            exit 1
          fi

          gh release create "$GITHUB_REF_NAME" "${files[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            --verify-tag
